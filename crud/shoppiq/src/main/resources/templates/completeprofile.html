<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Complete Profile</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        .register-container {
            background: white;
            padding: 30px;
            width: 350px;

            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .register-container h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;

            border: 1px solid #ccc;
            border-radius: 5px;

            box-sizing: border-box;
        }

        .readonly-field {
            background-color: #f5f5f5;
            color: #666;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 10px;

            background-color: black;
            color: white;

            border: none;
            border-radius: 5px;

            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

    </style>

</head>

<body>

    <div class="register-container">

        <h2>Complete Profile</h2>

        <div class="subtitle">
            Google account verified successfully.
            Choose a username and password to finish registration.
        </div>

        <form id="completeProfileForm">

            <div class="input-group">
                <label for="name">Full Name</label>

                <input
                        type="text"
                        id="name"
                        readonly
                        class="readonly-field">
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>

                <input
                        type="email"
                        id="email"
                        readonly
                        class="readonly-field">
            </div>

            <div class="input-group">
                <label for="username">Username</label>

                <input
                        type="text"
                        id="username"
                        placeholder="Choose a username"
                        required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>

                <input
                        type="password"
                        id="password"
                        placeholder="Choose a password"
                        required>
            </div>

            <button type="submit">
                Complete Registration
            </button>

            <div id="message" class="message"></div>

        </form>

    </div>

    <script>

        async function loadGoogleProfile() {

            try {

                const response =
                    await fetch("/auth/google/get-profile", {
                        credentials: "include"
                    });

                if (!response.ok) {
                    throw new Error("Unable to load profile");
                }

                const profile = await response.json();

                document.getElementById("name").value =
                    profile.name;

                document.getElementById("email").value =
                    profile.email;

            } catch (error) {

                console.error(error);

                document.getElementById("message").innerHTML =
                    "Unable to load Google profile information.";
            }
        }

        loadGoogleProfile();

        document
            .getElementById("completeProfileForm")
            .addEventListener("submit", async function (event) {

                event.preventDefault();

                const payload = {
                    username: document.getElementById("username").value,
                    password: document.getElementById("password").value
                };

                const response =
                    await fetch("/auth/google/complete-profile", {

                        method: "POST",

                        credentials: "include",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify(payload)
                    });

                const message =
                    document.getElementById("message");

                if (!response.ok) {

                    const errorText =
                        await response.text();

                    message.style.color = "red";
                    message.textContent = errorText;

                    return;
                }

                message.style.color = "green";
                message.textContent =
                    "Registration completed successfully.";

                setTimeout(() => {
                    window.location.href = "/allitems";
                }, 1000);
            });

    </script>

</body>
</html>
