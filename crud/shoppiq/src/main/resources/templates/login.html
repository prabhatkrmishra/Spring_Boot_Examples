<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 30px;
            width: 350px;

            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;

            border: 1px solid #ccc;
            border-radius: 5px;

            box-sizing: border-box;
        }

        .remember_me {
            display: flex;
            align-items: center;
            gap: 8px;

            margin-bottom: 15px;
        }

        .message {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;

            background-color: black;
            color: white;

            border: none;
            border-radius: 5px;

            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h2>Login</h2>

        <form id="loginForm">

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <div class="remember_me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember Me</label>
            </div>

            <button type="submit">
                Login
            </button>

            <button type="button"
                    onclick="window.location.href='/oauth2/authorization/google'"
                    style="margin-top:10px;">
                Login with Google
            </button>

            <div id="message" class="message"></div>
        </form>
    </div>

    <script>

        document
            .getElementById("loginForm")
            .addEventListener("submit", async function (event) {

                event.preventDefault();

                const username =
                    document.getElementById("username").value;

                const password =
                    document.getElementById("password").value;

                const rememberMe =
                    document.getElementById("rememberMe").checked;

                const message =
                    document.getElementById("message");

                try {

                    const response = await fetch("/auth/login", {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        /*
                         * credentials: "include" ensures the browser sends
                         * and accepts cookies on this request, even if the
                         * API is on a different origin.
                         */
                        credentials: "include",

                        body: JSON.stringify({
                            username: username,
                            password: password,
                            rememberMe: rememberMe
                        })
                    });

                    if (!response.ok) {

                        message.style.color = "red";
                        message.textContent =
                            "Invalid username or password";

                        return;
                    }

                    /*
                     * JWT Cookie Storage
                     *
                     * The server sets the JWT as an HttpOnly cookie via
                     * the Set-Cookie response header. The browser stores
                     * it automatically — no JS access to the token at all.
                     *
                     * Remember Me Checked  -> server sets Max-Age/Expires
                     *                         (persistent cookie)
                     * Remember Me Unchecked -> server omits Max-Age/Expires
                     *                         (session cookie, cleared on
                     *                          browser close)
                     *
                     * Recommended server Set-Cookie header:
                     *   Set-Cookie: jwt=<token>; HttpOnly; Secure;
                     *               SameSite=Strict; Path=/
                     *   (add Max-Age=<seconds> when rememberMe is true)
                     */

                    message.style.color = "green";
                    message.textContent = "Login successful";

                    setTimeout(() => {
                        window.location.href = "/allitems";
                    }, 1000);

                } catch (error) {

                    console.error(error);

                    message.style.color = "red";
                    message.textContent =
                        "Unable to connect to server";
                }
            });

    </script>

</body>
</html>
