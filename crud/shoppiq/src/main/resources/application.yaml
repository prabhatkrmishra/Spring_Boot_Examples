spring:
  application:
    name: shoppiq

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/cnkart_schema
    username: root
    password: spring@

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        id:
          optimizer:
            pooled:
              preferred: none

  session:
    jdbc:
      table-name: SPRING_SESSION
      initialize-schema: always

server:
  port: 8090