spring:
  application:
    name: course-service

  datasource:
    url: jdbc:mysql://localhost:3306/edtech_course_schema
    username: root
    password: spring@

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: '*'
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  info:
    env:
      enabled: true

hystrix:
  dashboard:
    proxy-stream-allow-list: "*"
