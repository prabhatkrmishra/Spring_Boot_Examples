spring:
  application:
    name: social_media
  datasource:
    url: jdbc:mysql://localhost:3306/loopin_schema
    username: root
    password: spring@
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
  session:
    jdbc:
      table-name: SPRING_SESSION
      initialize-schema: always
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true

management:
  endpoints: # All endpoints configuration
    web:
      exposure:
        include: '*'
      base-path: /metrics # Change base from actuator to metrics
  endpoint: # Single endpoint configuration
    health:
      show-details: always
  info:
    env:
      enabled: true

info: # Set info for the app
  app:
    description: This is a test social media application
    name: Loopin
    version: 0.0.1

server:
  port: 8090
